<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guarant</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="lang">
    <button class="active">RU</button>
    <button>EN</button>
</div>

<div class="container">

    <!-- PROFILE -->
    <div class="card profile reveal">
        <div class="avatar"></div>
        <h1>Chelsy rich</h1>
        <div class="typing" id="typing"></div>

        <div class="stats">
            <div class="stat">
                6%
                <span>комиссия</span>
            </div>
            <div class="stat">
                900+
                <span>сделок</span>
            </div>
        </div>
    </div>

    <!-- CONTACTS -->
    <div class="card reveal">
        <h2>Контакты</h2>

        <a class="contact">@nozwa</a>
        <a class="contact">Новостной канал →</a>
        <a class="contact">NozwaBase →</a>
    </div>

    <!-- PAYMENT -->
    <div class="card reveal">
        <h2>Оплата</h2>
        <div class="wallet">
            <span id="wallet">chelsy-rich.ton</span>
            <button onclick="copyWallet()">COPY</button>
        </div>
    </div>

    <!-- STEPS -->
    <div class="card reveal">
        <h2>Как проходит сделка</h2>

        <div class="step"><b>1</b> Продавец даёт реквизиты</div>
        <div class="step"><b>2</b> Передача товара гаранту</div>
        <div class="step"><b>3</b> Покупатель оплачивает</div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
